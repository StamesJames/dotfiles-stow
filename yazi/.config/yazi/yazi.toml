[mgr]
show_symlink = true

[opener]
open = [
  { run = 'xdg-open "$@"', orphan = true, desc = "Open xdg", for = "unix" },
]
browser = [
  { run = 'zen-browser "$@"', orphan = true, desc = "Open with zen-browser", for = "unix" },
]
edit = [
  { run = 'ghostty -e nvim "$@"', orphan = true, desc = "edit in nvim", for = "unix" }
]
play = [
  { run = 'vlc "$@"', orphan = true, desc = "play videos", for = "unix"}
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "video/*", use = "play" },
  { mime = "application/json", use = "edit" },

  { url = "*.json", use = "edit" },
  { url = "*.html", use = "browser" },
]
